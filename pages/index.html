<body id="body">

    <div id="leftBar">
        <a href="registration">Please sign up or something man.</a>
    </div>

    <div id="topBar">
        <p id="playerDataBox">blah ba</p>
    </div>

    <div id="gameBox">
        <div id="gameDescriptor">Your games</div>
        <button id="newGame">Create new game</button>
        <div id="gameContainer"></div>
    </div>

    <canvas id="can"></canvas>

    <style>
        #can {
            background: #444444;
            position: absolute;
            z-index: 0;
            left: 0px;
            top: 0px;
        }

        #leftBar {
            position: absolute;
            left: 10px;
            bottom: 10px;
            width: 250px;
            height: 360px;
            background-color: #eeeeee;
            border: solid black;
            z-index: 1;
        }

        #topBar {
            position: absolute;
            height: 30px;
            left: 0px;
            top: 0px;
            background-color: #222222;
            visibility: visible;
            z-index: 9;
        }

        #playerDataBox {
            position: absolute;
            height: 20px;
            top: -10px;
            font-size: 15px;
            color: #eeeeee;
            left: 400px;
        }

        #newGame {
            position: absolute;
            width: 250px;
            bottom: 300px;
            border-radius: 0px;
            border-top: solid black;
            border-bottom: solid black;
            border-left: none;
            border-right: none;
        }

        #gameBox {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 250px;
            height: 360px;
            background-color: #eeeeee;
            border: solid black;
            overflow: scroll;
            z-index: 1;
        }

        #gameContainer {
            position: absolute;
            bottom: 0px;
            right: 0px;
            width: 260px;
            height: 300px;
            background-color: #eeeeee;
            overflow-y: scroll;
            overflow-x: hidden;
        }
    </style>

    <script>
        drawPointGrid();
        topBar.style.width = window.innerWidth + 'px';
        const newText = `Curr user : Id:${localStorage['id']}, Name:${localStorage['name']}`;
        playerDataBox.innerText = newText;
        playerDataBox.style.left = window.innerWidth / 2 - 100 + 'px'

        function drawPointGrid() {
            can.width = window.innerWidth;
            can.height = window.innerHeight;
            const ctx = can.getContext('2d');
            const squareSize = 50;
            let currX = 20;
            while (currX < can.width + 100) {
                let currY = 0;
                while (currY < can.height + 100) {
                    if (
                        currX <= 0 &&
                        currX + squareSize >= 0
                    ) {
                        ctx.fillStyle = '#cccccc';
                    } else {
                        ctx.fillStyle = '#cccccc';
                    }
                    ctx.fillRect(currX - 1, currY - 1, 2, 2);
                    currY += squareSize;
                }
                currX += squareSize;
            }
        }
        async function signIn() {
            while (ws.readyState === 0) {
                await new Promise((resolve) => setTimeout(resolve, 10));
            }
            if (localStorage['id']) {
                ws.send(JSON.stringify({
                    userId: localStorage['id'],
                    event: {
                        entity: 'NAME',
                        pass: localStorage['pass'],
                        name: localStorage['name'],
                        id: localStorage['id'],
                    },
                    gameId: -1,
                    handler: 'META'
                }))
            }
        }

        async function requestGames() {
            ws.send(JSON.stringify({
                userId: localStorage['id'],
                event: {
                    entity: 'META',
                    action: 'ENUMERATE'
                },
                gameId: -3,
                handler: 'META'
            }))
        }

        const ws = new WebSocket('ws://47.55.46.138:4322/');

        ws.addEventListener('message', (event) => {
            const message = JSON.parse(event.data);
            if (message.entity && message.entity === 'NAME' && message.accepted) {
                requestGames();
            }
            if (message.newId) {
                window.location.pathname = "/game/" + message.newId
            } else if (message.list) {
                for (const val of message.list) {
                    const newBox = document.createElement('div');
                    const newText = document.createElement('a');
                    newText.href = '/game/' + val.toString();
                    newBox.append(newText)
                    gameContainer.append(newBox)
                    newBox.style.position = 'relative';
                    newBox.style.left = "20px";

                    newText.innerText = 'Game #' + val.toString();
                }
            }
        })

        newGame.addEventListener('click', () => {
            if (ws.readyState === 0) {
                alert("jeez man leave 0.01 seconds for the websocket to connect")
            } else if (localStorage['id']) {
                ws.send(
                    JSON.stringify({
                        userId: localStorage['id'],
                        event: {
                            entity: 'META',
                            action: 'CREATE'
                        },
                        gameId: -2,
                        handler: 'META'
                    }),
                );
            }
        })

        signIn();
    </script>
</body>
