<a href="game/0">Visit game 0, for real!</a>
<a href="game/1">Visit game 1, for real!</a>

<p id="credBox">Current user: </p>
<div id="gameBox">
    <div id="gameDescriptor">Your games</div>
    <button id="newGame">Create new game</button>
    <div id="gameContainer"></div>
</div>

<script>
    async function requestGames() {
        while (ws.readyState === 0) {
            await new Promise((resolve) => setTimeout(resolve, 10));
        }
        ws.send(JSON.stringify({
            userId: localStorage['id'],
            event: {
                entity: 'META',
                action: 'ENUMERATE'
            },
            gameId: -3,
            handler: 'META'
        }))
    }

    const ws = new WebSocket('ws://47.55.46.138:4322/');
    credBox.innerText = `Curr user : Id:${localStorage['id']}, Name:${localStorage['name']}`

    ws.addEventListener('message', (event) => {
        const message = JSON.parse(event.data);
        if (message.newId) {
            window.location.pathname = "/game/" + message.newId
        } else if (message.list) {
            for (const val of message.list) {
                const newBox = document.createElement('div');
                const newText = document.createElement('a');
                newText.href = '/game/' + val.toString();
                newBox.append(newText)
                gameContainer.append(newBox)
                newBox.style.position = 'relative';
                newBox.style.left = "20px";

                newText.innerText = 'Game #' + val.toString();
            }
        }
    })

    newGame.addEventListener('click', () => {
        if (ws.readyState === 0) {
            alert("jeez man leave 0.01 seconds for the websocket to connect")
        } else if (localStorage['id']) {
            ws.send(
                JSON.stringify({
                    userId: localStorage['id'],
                    event: {
                        entity: 'META',
                        action: 'CREATE'
                    },
                    gameId: -2,
                    handler: 'META'
                }),
            );
        }
    })

    requestGames();
</script>

        bottom: 0px;

    }
