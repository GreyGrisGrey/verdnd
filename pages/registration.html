<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
</head>

<body id="body">
<canvas id="can"></canvas>

<style>
    #can {
        background: #444444;
        position: absolute;
        z-index: 0;
        left: 0px;
        top: 0px;
    }
</style>

<script>
    can.width = window.innerWidth;
    can.height = window.innerHeight;
    const ctx = can.getContext('2d');
    const squareSize = 50;
    let currX = 20;
    while (currX < can.width + 100) {
        let currY = 0;
        while (currY < can.height + 100) {
            if (
                currX <= 0 &&
                currX + squareSize >= 0
            ) {
                ctx.fillStyle = '#cccccc';
            } else {
                ctx.fillStyle = '#cccccc';
            }
            ctx.fillRect(currX - 1, currY - 1, 2, 2);
            currY += squareSize;
        }
        currX += squareSize;
    }
</script>
<div id="topBar">
    <p id="playerDataBox">blah ba</p>
</div>

<style>
    #topBar {
        position: absolute;
        height: 30px;
        left: 0px;
        top: 0px;
        background-color: #222222;
        visibility: visible;
        z-index: 9;
    }

    #playerDataBox {
        position: absolute;
        height: 20px;
        top: -10px;
        font-size: 15px;
        color: #eeeeee;
        left: 400px;
    }
</style>

<script>
    topBar.style.width = window.innerWidth + 'px';
    const newText = `Curr user : Id:${localStorage['id']}, Name:${localStorage['name']}`;
    playerDataBox.innerText = newText;
    playerDataBox.style.left = window.innerWidth / 2 - 100 + 'px'
</script>
<div id="inputs">
    <p>Sign up. Or sign in. The server does not distinguish these requests yet.</p>
    <label id="userIdLabel">Insert user id:</label>
    <input type="text" id="userId" />
    <label id="userPassLabel">Insert password:</label>
    <input type="text" id="userPass" />
    <label id="userNameLabel">Insert user name:</label>
    <input type="text" id="userName" />
    <button id="submit">Submit</button>
</div>

<style>
    #submit {
        position: absolute;
        bottom: 0px;
        width: 350px;
        height: 60px;
        border-radius: 0px;
        border: 2px solid #000000;
        border-left: none;
        border-right: none;
        border-bottom: none;
    }

    #userIdLabel {
        position: absolute;
        left: 20px;
        top: 80px;
    }

    #userPassLabel {
        position: absolute;
        left: 20px;
        top: 140px;
    }

    #userNameLabel {
        position: absolute;
        left: 20px;
        top: 110px;
    }

    #userPass {
        position: absolute;
        left: 150px;
        top: 140px;
    }

    #userId {
        position: absolute;
        left: 150px;
        top: 80px;
    }

    #userName {
        position: absolute;
        left: 150px;
        top: 110px;
    }

    #inputs {
        position: absolute;
        height: 250px;
        width: 350px;
        bottom: 50px;
        left: 400px;
        background-color: #eeeeee;
        border: solid black;
    }
</style>

<script>
    const ws = new WebSocket('ws://47.55.46.138:4322/');

    inputs.style.left = (window.innerWidth - 350) / 2 + 'px'
    inputs.style.bottom = (window.innerHeight - 430) / 2 + 'px'

    ws.addEventListener('message', (event) => {
        const message = JSON.parse(event.data);
        if (message.entity === "NAME" && message.accepted) {
            localStorage['pass'] = userPass.value;
            localStorage['id'] = userId.value;
            localStorage['name'] = userName.value;
            alert("Successfully signed in/registered with current credentials.")
            window.location.pathname = '/'
        } else if (message.entity === "NAME" && !message.accepted) {
            alert("Could not sign in/register with those credentials")
        }
    })

    submit.addEventListener('click', () => {
        if (ws.readyState === 0) {
            alert("jeez man leave 0.01 seconds for the websocket to connect")
        } else {
            ws.send(
                JSON.stringify({
                    userId: userId.value,
                    event: {
                        entity: 'NAME',
                        pass: userPass.value,
                        name: userName.value,
                        id: userId.value,
                    },
                    gameId: -1,
                    handler: 'META'
                }),
            );
        }
    })
</script>
</body>
