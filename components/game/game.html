<title>Gameboard</title>
<div id="loadBlock">
    <h1 id="loadText">Loading</h1>
</div>
<style>
    #loadBlock {
        background: #222222;
        position: absolute;
        left: 0px;
        top: 0px;
        width: 3000px;
        height: 3000px;
        z-index: 90;
    }

    #loadText {
        position: absolute;
        color: #3333dd;
        left: 500px;
        top: 300px;
        z-index: 90;
    }
</style>

<div id="modeMenu">
    <button class="modeButton" id="viewMenuButton" disabled>View</button>
    <button class="modeButton" id="selectMenuButton">Select</button>
    <button class="modeButton" id="drawMenuButton">Draw</button>
    <button class="modeButton" id="undoMenuButton">Undo</button>
</div>

<div class="canvasContainer">
    <script>
        document.getElementById('loadText').style.left = window.innerWidth / 2 - 50 + "px";
        document.getElementById('loadText').style.top = window.innerHeight / 2 - 20 + "px";
        document.getElementById('loadBlock').style.width = window.innerWidth + "px";
        document.getElementById('loadBlock').style.height = window.innerHeight + "px";
    </script>
    <canvas ondragstart="return false;" ondrop="return false;" id="board" oncontextmenu="return false;"
        tabindex='1'></canvas>
</div>

<div id="tooltip">
    <p id="tooltipText"></p>
</div>

<input type="file" id="fileInput">

<style>
    #tooltip {
        position: absolute;
        background: rgba(30, 30, 30, 1);
        color: rgba(255, 255, 255, 1);
        width: 200px;
        height: 100px;
        border-radius: 10px;
        padding-left: 10px;
        padding-right: 10px;
        height: fit-content;
    }

    #board {
        background: #444444;
        position: absolute;
        z-index: 0;
        left: 0px;
        top: 0px;
    }

    .modeButton {
        z-index: 2;
        width: 60px;
        height: 40px;
        pointer-events: all;
        border: none;
        border-radius: 10px;
    }

    #selectMenuButton {
        position: absolute;
        top: 50px;
        left: 0px;
    }

    #drawMenuButton {
        position: absolute;
        top: 100px;
        left: 0px;
    }

    #undoMenuButton {
        position: absolute;
        top: -50px;
        left: 0px;
    }

    #modeMenu {
        position: absolute;
        z-index: 2;
        bottom: 10px;
        left: 10px;
        width: 100px;
        height: 150px;
        pointer-events: none;
    }

    #fileInput {
        visibility: hidden;
    }

    html,
    body {
        margin: 0;
        height: 100%;
        overflow: hidden
    }

    input {
        background-color: rgba(50, 50, 50, 1);
        color: rgba(255, 255, 255, 1);
        border-color: rgba(80, 80, 80, 1);
    }

    button {
        background: rgba(30, 30, 30, 1);
        color: rgba(255, 255, 255, 1);
        border-color: rgba(80, 80, 80, 1);
    }

    button:not(:disabled):hover {
        background-color: rgba(50, 50, 50, 1);
        color: rgba(255, 255, 255, 1);
        border-color: rgba(80, 80, 80, 1);
    }

    button:disabled {
        background-color: rgba(50, 50, 50, 1);
        color: rgba(220, 220, 220, 1);
        border-color: rgba(80, 80, 80, 1);
    }
</style>
